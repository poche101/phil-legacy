<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Service | Phil Legacy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --phil-gold: #C5A059;
            --phil-orange: #FF8C00;
            --stone-dark: #1c1917;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; 
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- Hero Section --- */
        .hero-section {
            position: relative;
            padding: 120px 0 80px;
            background: linear-gradient(rgba(28, 25, 23, 0.8), rgba(28, 25, 23, 0.8)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        .breadcrumb-item + .breadcrumb-item::before { content: "•"; color: var(--phil-gold); }
        .breadcrumb a {
            color: var(--phil-gold);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Form Container --- */
        .form-container {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: -60px;
            position: relative;
            z-index: 10;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--phil-gold);
            margin-bottom: 10px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            padding: 14px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--phil-gold);
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.15);
        }

        /* --- Checkbox Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
        }

        .form-check-input:checked { background-color: var(--phil-gold); border-color: var(--phil-gold); }

        .btn-submit {
            background: var(--phil-gold);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            transition: 0.4s;
            width: 100%;
        }

        /* --- Product Slider Section Styling --- */
        .product-section { background-color: transparent !important; }
        .product-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .product-card:hover { transform: translateY(-10px); }
        .product-card img { height: 200px; object-fit: cover; }
        
        .underline-wrapper { display: flex; gap: 5px; margin-top: 10px; }
        .line-main { width: 50px; height: 3px; background: var(--phil-gold); border-radius: 10px; }
        .line-faded { width: 20px; height: 3px; background: rgba(197, 160, 89, 0.3); border-radius: 10px; }

        .btn-card {
            background: transparent;
            border: 1px solid var(--phil-gold);
            color: var(--phil-gold);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-card:hover { background: var(--phil-gold); color: white; }

        @media (max-width: 768px) {
            .form-container { padding: 30px 20px; }
            .product-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb justify-content-center">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active text-white" aria-current="page">Request Service</li>
                </ol>
            </nav>
            <h1 class="display-4 fw-bold mt-3">Start Your <span style="color: var(--phil-gold);">Legacy</span></h1>
            <p class="lead opacity-75">Tell us about your commodity needs and we'll handle the logistics.</p>
        </div>
    </section>

    <section class="pb-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="form-container">
                        <form action="#" method="POST">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label"><i class="fa-solid fa-user me-2"></i>Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="fa-solid fa-envelope me-2"></i>Email Address</label>
                                    <input type="email" class="form-control" placeholder="john@company.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="fa-solid fa-phone me-2"></i>Telephone</label>
                                    <input type="tel" class="form-control" placeholder="+234 000 000 0000" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="fa-solid fa-building me-2"></i>Company Name</label>
                                    <input type="text" class="form-control" placeholder="Phil Legacy Ltd" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label"><i class="fa-solid fa-earth-africa me-2"></i>Country of Export</label>
                                    <input type="text" class="form-control" placeholder="e.g. United Kingdom, China, UAE" required>
                                </div>

                                <div class="col-12 mt-5">
                                    <h5 class="fw-bold mb-3" style="color: var(--phil-gold);">Select Products of Interest</h5>
                                    <div class="product-grid">
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p1"><label class="form-check-label ms-2" for="p1">Cocoa Beans</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p2"><label class="form-check-label ms-2" for="p2">Sesame Seeds</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p3"><label class="form-check-label ms-2" for="p3">Raw Cashew Nuts</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p4"><label class="form-check-label ms-2" for="p4">Fresh Ginger</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p5"><label class="form-check-label ms-2" for="p5">Dried Split Ginger</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p6"><label class="form-check-label ms-2" for="p6">Hardwood Charcoal</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p7"><label class="form-check-label ms-2" for="p7">Blanched Peanuts</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p8"><label class="form-check-label ms-2" for="p8">Sorghum Seeds</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p9"><label class="form-check-label ms-2" for="p9">Moringa Seeds</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p10"><label class="form-check-label ms-2" for="p10">Dried Cassava Chips</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p11"><label class="form-check-label ms-2" for="p11">Turmeric</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p12"><label class="form-check-label ms-2" for="p12">Tapioca Starch</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p13"><label class="form-check-label ms-2" for="p13">Shea Butter</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p14"><label class="form-check-label ms-2" for="p14">Soybeans</label></div></div>
                                        <div class="product-item"><div class="form-check"><input class="form-check-input" type="checkbox" id="p15"><label class="form-check-label ms-2" for="p15">Hibiscus Flowers</label></div></div>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <label class="form-label"><i class="fa-solid fa-comment-dots me-2"></i>Other Information</label>
                                    <textarea class="form-control" rows="4" placeholder="Volume required, specific timelines, etc..."></textarea>
                                </div>

                                <div class="col-12 text-center">
                                    <button type="submit" class="btn btn-submit">Send Request <i class="fa-solid fa-paper-plane ms-2"></i></button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="product-section py-5 overflow-hidden">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="display-5 fw-bold mb-0" style="color: var(--phil-gold); font-family: 'Playfair Display', serif;">
                    Products We Export
                </h2>
                <div class="underline-wrapper justify-content-center">
                    <span class="line-main"></span>
                    <span class="line-faded"></span>
                </div>
            </div>

            <div class="swiper continuousSwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="card product-card border-0 shadow-sm">
                            <img src="assets/img/cocoa.jpg" class="card-img-top" alt="Cocoa Beans">
                            <div class="card-body text-center p-3">
                                <h6 class="fw-bold">Cocoa Beans</h6>
                                <div class="stars small mb-2 text-warning"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                                <button class="btn btn-card w-100">Make Enquiry</button>
                            </div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="card product-card border-0 shadow-sm">
                            <img src="assets/img/sesame.jpg" class="card-img-top" alt="Sesame Seeds">
                            <div class="card-body text-center p-3">
                                <h6 class="fw-bold">Sesame Seeds</h6>
                                <div class="stars small mb-2 text-warning"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                                <button class="btn btn-card w-100">Make Enquiry</button>
                            </div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="card product-card border-0 shadow-sm">
                            <img src="assets/img/cashew.jpg" class="card-img-top" alt="Raw Cashew Nuts">
                            <div class="card-body text-center p-3">
                                <h6 class="fw-bold">Raw Cashew Nuts</h6>
                                <div class="stars small mb-2 text-warning"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                                <button class="btn btn-card w-100">Make Enquiry</button>
                            </div>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="card product-card border-0 shadow-sm">
                            <img src="assets/img/fresh-g.jpg" class="card-img-top" alt="Fresh Ginger">
                            <div class="card-body text-center p-3">
                                <h6 class="fw-bold">Fresh Ginger</h6>
                                <div class="stars small mb-2 text-warning"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                                <button class="btn btn-card w-100">Make Enquiry</button>
                            </div>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.continuousSwiper', {
            slidesPerView: 1,
            spaceBetween: 20,
            loop: true,
            autoplay: { delay: 3000, disableOnInteraction: false },
            breakpoints: {
                640: { slidesPerView: 2 },
                992: { slidesPerView: 4 }
            }
        });
    </script>
</body>
</html>
